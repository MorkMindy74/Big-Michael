version: "3.9"

# Dev stack — swap qdrant for ruvnet/ruvector once stable Docker image is published:
# https://github.com/ruvnet/RuVector

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fac-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

volumes:
  qdrant_data:
